<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <rect width="800" height="220" rx="12" fill="#0d1117"/>

  <!-- K8s namespace box -->
  <rect x="200" y="20" width="480" height="160" rx="10" fill="none" stroke="#326ce5" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="440" y="14" text-anchor="middle" fill="#326ce5" font-size="10">inventory-app namespace (Kubernetes)</text>

  <!-- Client -->
  <rect x="20" y="80" width="100" height="60" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="70" y="105" text-anchor="middle" fill="#c9d1d9" font-size="18">💻</text>
  <text x="70" y="128" text-anchor="middle" fill="#c9d1d9" font-size="11">Client</text>

  <!-- Arrow -->
  <line x1="120" y1="110" x2="198" y2="110" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Ingress -->
  <rect x="210" y="80" width="100" height="60" rx="8" fill="#21262d" stroke="#326ce5" stroke-width="1.5"/>
  <text x="260" y="105" text-anchor="middle" fill="#326ce5" font-size="18">⇌</text>
  <text x="260" y="128" text-anchor="middle" fill="#c9d1d9" font-size="11">Ingress</text>

  <!-- Arrow -->
  <line x1="310" y1="110" x2="338" y2="110" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Service -->
  <rect x="340" y="80" width="100" height="60" rx="8" fill="#21262d" stroke="#326ce5" stroke-width="1.5"/>
  <text x="390" y="105" text-anchor="middle" fill="#326ce5" font-size="18">⚖</text>
  <text x="390" y="128" text-anchor="middle" fill="#c9d1d9" font-size="11">Service</text>

  <!-- Arrow -->
  <line x1="440" y1="110" x2="468" y2="110" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Pod -->
  <rect x="470" y="60" width="100" height="100" rx="8" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="520" y="95" text-anchor="middle" fill="#3fb950" font-size="16">📦</text>
  <text x="520" y="112" text-anchor="middle" fill="#c9d1d9" font-size="10">Pod</text>
  <text x="520" y="125" text-anchor="middle" fill="#8b949e" font-size="9">inventory-api</text>
  <text x="520" y="138" text-anchor="middle" fill="#8b949e" font-size="9">:8080 /health ✓</text>

  <!-- Arrow -->
  <line x1="570" y1="110" x2="598" y2="110" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- SQL Pod -->
  <rect x="600" y="80" width="100" height="60" rx="8" fill="#21262d" stroke="#f78166" stroke-width="1.5"/>
  <text x="650" y="105" text-anchor="middle" fill="#f78166" font-size="18">🗄</text>
  <text x="650" y="120" text-anchor="middle" fill="#c9d1d9" font-size="10">SQL Server</text>
  <text x="650" y="133" text-anchor="middle" fill="#8b949e" font-size="9">Pod (demo)</text>

  <!-- Title -->
  <text x="400" y="200" text-anchor="middle" fill="#8b949e" font-size="11">Stockflow K8s — Request Flow: Client → Ingress → Service → Pod → DB</text>

  <defs>
    <marker id="arrow2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#30363d"/>
    </marker>
  </defs>
</svg>
